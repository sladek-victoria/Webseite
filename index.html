<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Familiengeführte Pension in Steinmauern bei Rastatt – komfortabel, ruhig und herzlich." />
  <title>Pension Victoria – Steinmauern bei Rastatt</title>
  <link rel="icon" type="image/png" href="./assets/pension-victoria-logo-ofRX9QH1.png" />
  <script type="module" crossorigin src="./assets/main-gldIeUAJ.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/i18n-BJ_62__y.js">
  <link rel="modulepreload" crossorigin href="./assets/content-DSjmOCAm.js">
  <link rel="stylesheet" crossorigin href="./assets/main-CDw51YEA.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Zum Hauptinhalt springen</a>

  <!-- ░░ Header ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <header id="site-header" role="banner">
    <div class="header-inner">
      <a href="#hero" class="site-logo" aria-label="Pension Victoria – Startseite">
        <img id="header-logo" src="./assets/pension-victoria-logo_schwarz-c6N0_yIK.png" alt="Pension Victoria Logo" />
      </a>

      <nav id="main-nav" aria-label="Hauptnavigation">
        <ul class="site-nav" role="list">
          <li><a href="#about"     data-i18n="nav.home"></a></li>
          <li><a href="#rooms"     data-i18n="nav.rooms"></a></li>
          <li><a href="#breakfast" data-i18n="nav.breakfast"></a></li>
          <li><a href="#contact"   data-i18n="nav.contact"></a></li>
        </ul>
      </nav>

      <div class="header-right">
        <div class="lang-switcher" role="group" aria-label="Sprache wählen">
          <button class="lang-btn" data-locale="de" aria-pressed="true">DE</button>
          <button class="lang-btn" data-locale="en" aria-pressed="false">EN</button>
          <button class="lang-btn" data-locale="pl" aria-pressed="false">PL</button>
        </div>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Navigation öffnen">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ░░ Main ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <main id="main-content">

    <!-- Hero -->
    <section id="hero" aria-label="Hero">
      <img id="hero-img" class="hero-img" src="./assets/Hero-BNqHQcZV.jpg" alt="Pension Victoria" loading="eager" />
      <div class="hero-overlay" aria-hidden="true"></div>
      <div class="hero-content">
        <img id="hero-logo" class="hero-logo" src="./assets/pension-victoria-logo-ofRX9QH1.png" alt="Pension Victoria" />
        <h1 id="hero-tagline" class="hero-tagline"></h1>
        <p  id="hero-subtitle" class="hero-subtitle"></p>
        <div class="hero-actions">
          <a href="#contact" class="btn btn-primary" data-i18n="hero.book"></a>
          <a href="#contact" class="btn btn-outline" data-i18n="hero.contact"></a>
        </div>
      </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="section section-alt">
      <div class="container">
        <div id="gallery-grid" aria-label="Bildergalerie">
          <!-- Rendered by main.js -->
        </div>
      </div>
    </section>

    <!-- About -->
    <section id="about" class="section" aria-labelledby="about-heading">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title" data-i18n="about.title" id="about-heading"></h2>
          <div class="section-divider" aria-hidden="true"></div>
        </div>
        <div class="about-content fade-in">
          <p id="about-heading-text" class="about-heading"></p>
          <p id="about-text" class="about-text"></p>
          <p id="about-signature" class="about-signature"></p>
        </div>
      </div>
    </section>

    <!-- Rooms -->
    <section id="rooms" class="section section-alt" aria-labelledby="rooms-heading">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title" data-i18n="rooms.title" id="rooms-heading"></h2>
          <div class="section-divider" aria-hidden="true"></div>
        </div>
        <div id="rooms-grid" class="rooms-grid" aria-label="Zimmerübersicht">
          <!-- Rendered by main.js -->
        </div>
      </div>
    </section>

    <!-- Breakfast -->
    <section id="breakfast" class="section" aria-labelledby="breakfast-heading">
      <div class="container">
        <div class="inner">
          <div class="breakfast-images fade-in" id="breakfast-images">
            <!-- Rendered by main.js -->
          </div>
          <div class="breakfast-text">
            <div class="section-header" style="text-align:left">
              <h2 class="section-title" data-i18n="breakfast.title" id="breakfast-heading"></h2>
              <div class="section-divider" aria-hidden="true"></div>
            </div>
            <p id="breakfast-desc" class="breakfast-desc"></p>
            <div class="breakfast-price-badge">
              <span id="breakfast-price"></span> €
              <span data-i18n="breakfast.per_person"></span>
              &ndash; <span data-i18n="breakfast.on_request"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Prices / Extras -->
    <section id="prices" class="section section-alt" aria-labelledby="prices-heading">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title" data-i18n="extras.title" id="prices-heading"></h2>
          <div class="section-divider" aria-hidden="true"></div>
        </div>
        <div style="overflow-x:auto">
          <table class="prices-table" id="prices-table" aria-label="Preisübersicht">
            <thead>
              <tr>
                <th scope="col" data-i18n="rooms.title"></th>
                <th scope="col" data-i18n="extras.price"></th>
              </tr>
            </thead>
            <tbody id="prices-body">
              <!-- Rendered by main.js -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Flexible / Human Touch -->
    <section id="flexible" class="flexible-section">
      <div class="container">
        <div class="flexible-inner">
          <h2 class="flexible-title" data-i18n="flexible.title"></h2>
          <p id="flexible-personal" class="flexible-personal"></p>
          <ul class="flexible-list">
            <li data-i18n="flexible.item1"></li>
            <li data-i18n="flexible.item2"></li>
            <li data-i18n="flexible.item3"></li>
          </ul>
          <a href="#contact" class="btn flexible-cta" data-i18n="flexible.cta"></a>
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section section-alt" aria-labelledby="contact-heading">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title" data-i18n="contact.title" id="contact-heading"></h2>
          <div class="section-divider" aria-hidden="true"></div>
        </div>
        <div class="inner">
          <div class="contact-card fade-in">

            <div class="contact-block">
              <div class="contact-label" data-i18n="contact.address_label"></div>
              <div class="contact-value" id="contact-address"></div>
            </div>

            <div class="contact-block">
              <div class="contact-label" data-i18n="contact.phone_label"></div>
              <div class="contact-value" id="contact-phones"></div>
            </div>

            <div class="contact-block">
              <div class="contact-label" data-i18n="contact.email_label"></div>
              <div class="contact-value">
                <a id="contact-email" href=""></a>
              </div>
            </div>

            <div class="contact-checkin contact-block">
              <div class="checkin-item">
                <div class="contact-label" data-i18n="contact.checkin_label"></div>
                <div class="contact-value">
                  <span data-i18n="contact.checkin_from"></span>
                  <strong id="contact-checkin"></strong>
                </div>
              </div>
              <div class="checkin-item">
                <div class="contact-label" data-i18n="contact.checkout_label"></div>
                <div class="contact-value">
                  <span data-i18n="contact.checkout_until"></span>
                  <strong id="contact-checkout"></strong>
                </div>
              </div>
            </div>

            <div class="contact-block">
              <div class="contact-label" data-i18n="contact.dogs"></div>
              <div class="contact-value" id="contact-dogs"></div>
            </div>

            <a id="contact-mailto" href="" class="btn btn-secondary" style="margin-top:1rem" data-i18n="contact.write_us"></a>
          </div>

          <div class="contact-map fade-in" id="map-consent-wrapper">
            <div class="map-placeholder">
              <p data-i18n="cookies.map_notice"></p>
              <button id="map-load-btn" class="btn btn-primary" data-i18n="cookies.load_map"></button>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ░░ Footer ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░ -->
  <footer id="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p>Pension Victoria &copy; <span id="footer-year"></span> &middot; <span data-i18n="footer.rights"></span></p>
      <p><a href="impressum.html">Impressum</a> &middot; <a href="datenschutz.html">Datenschutz</a></p>
      <p class="footer-admin-link"><a href="victoriacms.html">Admin</a></p>
    </div>
  </footer>

  <!-- Cookie consent banner -->
  <div id="cookie-banner" class="cookie-banner" role="dialog" aria-modal="true" aria-labelledby="cookie-banner-title" hidden>
    <div class="cookie-banner-inner">
      <p id="cookie-banner-title" data-i18n="cookies.banner_text"></p>
      <div class="cookie-banner-actions">
        <button id="cookie-accept" class="btn btn-primary" data-i18n="cookies.accept"></button>
        <button id="cookie-decline" class="btn btn-secondary" data-i18n="cookies.decline"></button>
      </div>
    </div>
  </div>

</body>
</html>
